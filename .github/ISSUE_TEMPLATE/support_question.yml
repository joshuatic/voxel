name: Support question
description: Ask for setup or usage help
title: "[Support]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Need help? Fill this out so others can help quickly.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What you already tried
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 14
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Include only the relevant part and remove sensitive data.
      render: shell
    validations:
      required: false
