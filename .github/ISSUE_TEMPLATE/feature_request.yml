name: Feature request
description: Suggest an improvement or new capability for Voxel
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This request keeps Voxel local-first.
          required: false
        - label: This may require non-trivial architecture or dependency changes.
          required: false
